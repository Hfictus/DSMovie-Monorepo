# Configuracao do PostgreSQL em desenvolvimento
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/dsmovie}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:1234567}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Evitar ocorrer automaticamente DDL
spring.jpa.hibernate.ddl-auto=update

# Mostrar SQL em desenvolvimento (opcional)
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true


# Senha fixa para desenvolvimento (substituir por UserDetailsService em producao)
spring.security.user.name=admin
spring.security.user.password=admin